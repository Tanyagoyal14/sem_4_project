<!DOCTYPE html>
<html>
<body>

<h2>Feedback Analytics</h2>

<button onclick="loadFeedback()">Load Feedback</button>

<ul id="feedbackList"></ul>

<script>
function loadFeedback(){
    fetch("http://127.0.0.1:5000/get-feedback")
    .then(res => res.json())
    .then(data => {
        let list = document.getElementById("feedbackList");
        list.innerHTML = "";

        data.forEach(item => {
            let li = document.createElement("li");

            li.innerText =
                item.feedback +
                " | Sentiment: " + item.sentiment +
                " (" + item.confidence + ")";

            list.appendChild(li);
        });
    });
}
</script>

</body>
</html>

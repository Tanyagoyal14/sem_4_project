services:
  # 1. Backend Service (Python/FastAPI)
  - type: web
    name: sem4-backend
    runtime: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: MONGODB_URI
        sync: false
      - key: PYTHON_VERSION
        value: 3.11.0

  # 2. Frontend Service (React/Vite) - Yahan "static_site" aayega
  - type: static_site
    name: sem4-frontend
    runtime: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    envVars:
      - key: VITE_API_BASE_URL
        fromService:
          type: web
          name: sem4-backend
          property: host
